      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

          }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is

      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

y: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"8e49a6e6-d10c-4cd9-8e61-1920e117c063\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"2b8bf44e-63fc-424f-ad98-511065587f00\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n  <style>/* ============================================================\n   MENOPAUSE BADDIE — Recruit-the-Nation landing page\n   ------------------------------------------------------------\n   Palette pulled from the logo: warm cream + black + the soft\n   blush/peach highlights inside the mark. The \"rallying\" accent\n   is a deep rose-wine (instead of fire-engine red) so the\n   call-to-arms still pops but stays brand-true.\n\n   --ivory     #F5EADB   logo background cream\n   --ivory-2   #ECD9C5   peachy panel\n   --ivory-3   #E5C5B0   deeper peach\n   --blush     #E8B4A8   logo highlight pink\n   --ink       #1A140F   warm near-black\n   --rose      #B84A5C   primary CTA / accent (replacing red)\n   --wine      #7A2E3C   deep editorial accent\n   --gold      #C9A56B   brand continuity\n   --line      #DCC4AA   subtle divider on cream\n\n   Type: Instrument Serif · Geist · JetBrains Mono\n   ============================================================ */\n\n:root {\n  --ivory:   #F5EADB;\n  --ivory-2: #ECD9C5;\n  --ivory-3: #E5C5B0;\n  --blush:   #E8B4A8;\n  --ink:     #1A140F;\n  --ink-2:   #2C2218;\n  --ink-3:   #6B5B47;\n  --wine:    #7A2E3C;\n  --oxblood: #7A2E3C; /* alias for backwards compat */\n  --rose:    #B84A5C;\n  --recruit: #B84A5C; /* alias — controls/JS still reference this name */\n  --recruit-dk: #8E2840;\n  --gold:    #C9A56B;\n  --gold-dk: #9c7c45;\n  --line:    #DCC4AA;\n  --line-2:  #C7A98A;\n\n  --serif: \"Instrument Serif\", \"Cormorant Garamond\", Georgia, serif;\n  --sans:  \"Geist\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  --mono:  \"JetBrains Mono\", ui-monospace, SFMono-Regular, monospace;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: var(--ivory);\n  color: var(--ink);\n  font-family: var(--sans);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbody {\n  font-size: 16px;\n  line-height: 1.5;\n}\n\nimg { display: block; max-width: 100%; }\n\n/* ---------- Typographic scale ---------- */\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink-2);\n  font-weight: 500;\n}\n\n.eyebrow.recruit { color: var(--recruit); }\n.eyebrow.ivory   { color: var(--ivory); }\n.eyebrow.gold    { color: var(--gold-dk); }\n\n.display {\n  font-family: var(--serif);\n  font-weight: 400;\n  line-height: 0.92;\n  letter-spacing: -0.015em;\n  margin: 0;\n}\n\n.display em {\n  font-style: italic;\n  color: var(--oxblood);\n}\n\n.serif-italic { font-family: var(--serif); font-style: italic; }\n\n.h1 { font-size: clamp(56px, 9vw, 148px); }\n.h2 { font-size: clamp(40px, 6vw, 88px); }\n.h3 { font-size: clamp(28px, 3.4vw, 52px); }\n.h4 { font-size: clamp(22px, 2.2vw, 32px); }\n\n.body-lg { font-size: 19px; line-height: 1.5; color: var(--ink-2); }\n.body    { font-size: 16px; line-height: 1.55; color: var(--ink-2); }\n.small   { font-size: 13px; color: var(--ink-3); }\n\n.mono { font-family: var(--mono); }\n\n/* ---------- Top urgency ribbon ---------- */\n.ribbon {\n  position: relative;\n  z-index: 50;\n  background: var(--ink);\n  color: var(--ivory);\n  overflow: hidden;\n  border-bottom: 1px solid #000;\n}\n\n.ribbon-track {\n  display: flex;\n  gap: 56px;\n  white-space: nowrap;\n  padding: 10px 0;\n  animation: scroll 60s linear infinite;\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.24em;\n  text-transform: uppercase;\n}\n\n.ribbon-track span { display: inline-flex; align-items: center; gap: 12px; }\n.ribbon-track .dot { color: var(--recruit); }\n\n@keyframes scroll {\n  from { transform: translateX(0); }\n  to   { transform: translateX(-50%); }\n}\n\n/* ---------- Top nav ---------- */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 40;\n  background: rgba(245,234,219, 0.92);\n  backdrop-filter: blur(10px);\n  -webkit-backdrop-filter: blur(10px);\n  border-bottom: 1px solid var(--line);\n}\n\n.nav-inner {\n  max-width: 1480px;\n  margin: 0 auto;\n  padding: 18px 40px;\n  display: grid;\n  grid-template-columns: 1fr auto 1fr;\n  align-items: center;\n  gap: 32px;\n}\n\n.nav-brand {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink);\n}\n\n.nav-brand .seal {\n  width: 36px; height: 36px;\n  border-radius: 50%;\n  background: var(--ink);\n  color: var(--ivory);\n  display: grid; place-items: center;\n  font-family: var(--serif);\n  font-size: 20px;\n  font-style: italic;\n}\n\n.nav-links {\n  display: flex;\n  gap: 36px;\n  font-family: var(--mono);\n  font-size: 11.5px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n}\n\n.nav-links a {\n  color: var(--ink);\n  text-decoration: none;\n  position: relative;\n  padding: 6px 0;\n  transition: color .15s;\n}\n.nav-links a:hover { color: var(--recruit); }\n.nav-links a.active::after {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0; bottom: -2px;\n  height: 2px;\n  background: var(--recruit);\n}\n\n.nav-cta {\n  display: flex;\n  justify-content: flex-end;\n  gap: 12px;\n  align-items: center;\n}\n\n/* ---------- Buttons ---------- */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 14px 24px;\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  border: none;\n  cursor: pointer;\n  text-decoration: none;\n  transition: transform .12s ease, background .15s, color .15s;\n}\n.btn:hover { transform: translateY(-1px); }\n\n.btn-recruit {\n  background: var(--recruit);\n  color: var(--ivory);\n}\n.btn-recruit:hover { background: var(--recruit-dk); }\n\n.btn-ink {\n  background: var(--ink);\n  color: var(--ivory);\n}\n.btn-ink:hover { background: var(--ink-2); }\n\n.btn-ghost {\n  background: transparent;\n  color: var(--ink);\n  border: 1px solid var(--ink);\n}\n.btn-ghost:hover { background: var(--ink); color: var(--ivory); }\n\n.btn-ghost-light {\n  background: transparent;\n  color: var(--ivory);\n  border: 1px solid var(--ivory);\n}\n.btn-ghost-light:hover { background: var(--ivory); color: var(--ink); }\n\n.btn-lg { padding: 18px 32px; font-size: 13px; }\n\n/* ---------- Layout helpers ---------- */\n.section {\n  padding: 100px 40px;\n  max-width: 1480px;\n  margin: 0 auto;\n}\n\n.section-tight { padding: 64px 40px; }\n\n.divider {\n  height: 1px;\n  background: var(--line);\n  max-width: 1480px;\n  margin: 0 auto;\n}\n\n.grid { display: grid; }\n\n/* ---------- HERO ---------- */\n.hero {\n  position: relative;\n  padding: 56px 40px 0;\n  max-width: 1480px;\n  margin: 0 auto;\n}\n\n.hero-status {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  margin-bottom: 32px;\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n}\n\n.live-dot {\n  width: 9px; height: 9px;\n  border-radius: 50%;\n  background: var(--recruit);\n  box-shadow: 0 0 0 0 rgba(184,74,92,0.7);\n  animation: pulse 1.6s infinite;\n}\n@keyframes pulse {\n  0%   { box-shadow: 0 0 0 0 rgba(184,74,92,0.55); }\n  70%  { box-shadow: 0 0 0 12px rgba(184,74,92,0); }\n  100% { box-shadow: 0 0 0 0 rgba(184,74,92,0); }\n}\n\n.hero-title {\n  font-family: var(--serif);\n  font-weight: 400;\n  line-height: 0.88;\n  letter-spacing: -0.025em;\n  margin: 0;\n  font-size: clamp(60px, 11vw, 180px);\n}\n.hero-title .line { display: block; }\n.hero-title em {\n  font-style: italic;\n  color: var(--oxblood);\n}\n.hero-title .recruit { color: var(--recruit); font-style: italic; }\n\n.hero-sub {\n  max-width: 560px;\n  font-size: 19px;\n  line-height: 1.5;\n  color: var(--ink-2);\n  margin-top: 36px;\n}\n\n.hero-cta {\n  display: flex;\n  gap: 14px;\n  margin-top: 36px;\n  flex-wrap: wrap;\n}\n\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.15fr 1fr;\n  gap: 56px;\n  align-items: end;\n  margin-top: 56px;\n}\n\n.hero-image-wrap {\n  position: relative;\n  aspect-ratio: 4 / 5;\n  background: var(--ivory-2);\n  overflow: hidden;\n}\n.hero-image-wrap img {\n  width: 100%; height: 100%;\n  object-fit: cover;\n  filter: contrast(1.02) saturate(0.95);\n}\n\n.hero-stamp {\n  position: absolute;\n  top: 24px; right: 24px;\n  width: 130px; height: 130px;\n  border-radius: 50%;\n  background: var(--recruit);\n  color: var(--ivory);\n  display: grid; place-items: center;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  text-align: center;\n  line-height: 1.4;\n  text-transform: uppercase;\n  transform: rotate(-8deg);\n  border: 2px solid var(--ivory);\n  outline: 1px solid var(--recruit);\n  outline-offset: 4px;\n}\n\n.hero-stamp strong {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 26px;\n  font-weight: 400;\n  display: block;\n  letter-spacing: 0;\n  margin: 2px 0;\n}\n\n.hero-stats {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  border-top: 1px solid var(--line);\n  border-bottom: 1px solid var(--line);\n  margin-top: 56px;\n}\n.hero-stats .stat {\n  padding: 28px 24px 28px 0;\n  border-right: 1px solid var(--line);\n}\n.hero-stats .stat:last-child { border-right: none; }\n.hero-stats .num {\n  font-family: var(--serif);\n  font-size: clamp(40px, 5vw, 72px);\n  line-height: 1;\n  color: var(--ink);\n}\n.hero-stats .num em { font-style: italic; color: var(--oxblood); }\n.hero-stats .lbl {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin-top: 10px;\n}\n\n/* ---------- Manifesto / \"Why now\" ---------- */\n.manifesto {\n  background: var(--ink);\n  color: var(--ivory);\n  padding: 120px 40px;\n}\n.manifesto-inner {\n  max-width: 1480px;\n  margin: 0 auto;\n  display: grid;\n  grid-template-columns: 1fr 1.2fr;\n  gap: 80px;\n}\n.manifesto h2 {\n  font-family: var(--serif);\n  font-weight: 400;\n  font-size: clamp(48px, 7vw, 108px);\n  line-height: 0.92;\n  letter-spacing: -0.02em;\n  margin: 0;\n}\n.manifesto h2 em { color: var(--recruit); font-style: italic; }\n.manifesto .body-lg { color: rgba(245,234,219,0.78); }\n.manifesto .figures {\n  margin-top: 40px;\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 24px;\n}\n.manifesto .figure {\n  border-top: 1px solid rgba(245,234,219,0.18);\n  padding-top: 16px;\n}\n.manifesto .figure .n {\n  font-family: var(--serif);\n  font-size: 56px;\n  line-height: 1;\n  color: var(--gold);\n}\n.manifesto .figure .l {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  margin-top: 8px;\n  color: rgba(245,234,219,0.7);\n}\n\n/* ---------- Pillars row ---------- */\n.pillars {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  border: 1px solid var(--line);\n  background: var(--ivory-2);\n}\n.pillar {\n  padding: 36px 28px;\n  border-right: 1px solid var(--line);\n  background: var(--ivory);\n}\n.pillar:last-child { border-right: none; }\n.pillar .glyph {\n  font-family: var(--serif);\n  font-size: 32px;\n  color: var(--oxblood);\n  margin-bottom: 22px;\n  display: block;\n}\n.pillar h3 {\n  font-family: var(--serif);\n  font-weight: 400;\n  font-size: 28px;\n  line-height: 1.05;\n  margin: 0 0 10px;\n}\n\n/* ---------- Education / Learn tab ---------- */\n.learn {\n  padding: 120px 40px;\n  background: var(--ivory-2);\n}\n.learn-inner {\n  max-width: 1480px;\n  margin: 0 auto;\n}\n.learn-head {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 56px;\n  align-items: end;\n  margin-bottom: 56px;\n}\n\n.tabs {\n  display: flex;\n  gap: 0;\n  border-bottom: 1px solid var(--line-2);\n  margin-bottom: 48px;\n  overflow-x: auto;\n  scrollbar-width: none;\n}\n.tabs::-webkit-scrollbar { display: none; }\n\n.tab {\n  font-family: var(--mono);\n  font-size: 11.5px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  padding: 18px 28px 16px;\n  background: transparent;\n  border: none;\n  cursor: pointer;\n  color: var(--ink-3);\n  position: relative;\n  white-space: nowrap;\n  transition: color .15s;\n}\n.tab .idx {\n  color: var(--line-2);\n  margin-right: 10px;\n  font-feature-settings: \"tnum\";\n}\n.tab:hover { color: var(--ink); }\n.tab.is-active { color: var(--ink); }\n.tab.is-active .idx { color: var(--recruit); }\n.tab.is-active::after {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0; bottom: -1px;\n  height: 2px;\n  background: var(--recruit);\n}\n\n.tab-body { min-height: 480px; }\n\n/* Symptom cards */\n.symptom-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 20px;\n}\n.symptom {\n  background: var(--ivory);\n  border: 1px solid var(--line);\n  padding: 28px 24px;\n  display: flex;\n  flex-direction: column;\n  gap: 12px;\n  min-height: 240px;\n  cursor: pointer;\n  transition: border-color .15s, transform .15s;\n}\n.symptom:hover {\n  border-color: var(--recruit);\n  transform: translateY(-2px);\n}\n.symptom .num {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.2em;\n  color: var(--ink-3);\n}\n.symptom h4 {\n  font-family: var(--serif);\n  font-size: 28px;\n  font-weight: 400;\n  margin: 0;\n  line-height: 1.1;\n}\n.symptom .pct {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--oxblood);\n  margin-top: auto;\n}\n\n/* Stages timeline */\n.timeline {\n  position: relative;\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  border: 1px solid var(--line);\n  background: var(--ivory);\n}\n.tl-stage {\n  padding: 40px 32px;\n  border-right: 1px solid var(--line);\n  position: relative;\n}\n.tl-stage:last-child { border-right: none; }\n.tl-stage .age {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--recruit);\n}\n.tl-stage h4 {\n  font-family: var(--serif);\n  font-size: 40px;\n  font-weight: 400;\n  line-height: 1;\n  margin: 14px 0 18px;\n}\n.tl-stage ul {\n  list-style: none;\n  padding: 0;\n  margin: 18px 0 0;\n  font-size: 14px;\n  color: var(--ink-2);\n}\n.tl-stage li {\n  padding: 8px 0;\n  border-top: 1px dashed var(--line);\n  display: flex;\n  gap: 10px;\n}\n.tl-stage li::before {\n  content: \"✦\";\n  color: var(--oxblood);\n  font-size: 12px;\n  margin-top: 2px;\n}\n\n/* HRT myths/facts */\n.myths {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 20px;\n}\n.myth {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  border: 1px solid var(--line);\n  background: var(--ivory);\n}\n.myth .side {\n  padding: 28px 24px;\n}\n.myth .side.fact {\n  background: var(--ink);\n  color: var(--ivory);\n}\n.myth .lbl {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.24em;\n  text-transform: uppercase;\n  margin-bottom: 12px;\n}\n.myth .side.myth-side .lbl { color: var(--recruit); }\n.myth .side.fact .lbl { color: var(--gold); }\n.myth p {\n  font-family: var(--serif);\n  font-size: 20px;\n  line-height: 1.25;\n  margin: 0;\n}\n\n/* Ask-a-specialist widget */\n.ask {\n  background: var(--ivory);\n  border: 1px solid var(--line);\n  padding: 40px;\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n  gap: 48px;\n}\n.ask-form { display: flex; flex-direction: column; gap: 20px; }\n.ask textarea {\n  width: 100%;\n  min-height: 140px;\n  padding: 18px 20px;\n  background: var(--ivory-2);\n  border: 1px solid var(--line);\n  font-family: var(--sans);\n  font-size: 16px;\n  color: var(--ink);\n  resize: vertical;\n}\n.ask textarea:focus { outline: 2px solid var(--recruit); }\n.ask .quick {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 8px;\n}\n.ask .chip {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  padding: 8px 14px;\n  background: var(--ivory-2);\n  border: 1px solid var(--line);\n  cursor: pointer;\n}\n.ask .chip:hover { background: var(--ink); color: var(--ivory); border-color: var(--ink); }\n\n.ask-response {\n  background: var(--ivory-2);\n  border: 1px solid var(--line);\n  padding: 28px;\n  min-height: 220px;\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n}\n.ask-response .meta {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n.ask-response .text {\n  font-family: var(--serif);\n  font-size: 20px;\n  line-height: 1.35;\n  color: var(--ink);\n}\n.ask-response .text.placeholder {\n  color: var(--ink-3);\n  font-style: italic;\n}\n.ask-response .disclaimer {\n  margin-top: auto;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  padding-top: 14px;\n  border-top: 1px solid var(--line);\n}\n\n/* Advocacy */\n.advocacy {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 56px;\n  align-items: start;\n}\n.advocacy-stats {\n  display: grid;\n  gap: 0;\n  border-top: 1px solid var(--line);\n}\n.advocacy-stat {\n  padding: 24px 0;\n  border-bottom: 1px solid var(--line);\n  display: grid;\n  grid-template-columns: auto 1fr;\n  gap: 32px;\n  align-items: baseline;\n}\n.advocacy-stat .n {\n  font-family: var(--serif);\n  font-size: 56px;\n  line-height: 1;\n  color: var(--oxblood);\n}\n.advocacy-stat .n em { font-style: italic; color: var(--recruit); }\n.advocacy-stat .l {\n  font-size: 15px;\n  color: var(--ink-2);\n}\n\n.fight-list { list-style: none; padding: 0; margin: 24px 0 0; }\n.fight-list li {\n  display: flex;\n  gap: 16px;\n  padding: 16px 0;\n  border-bottom: 1px solid var(--line);\n  font-size: 16px;\n}\n.fight-list li::before {\n  content: \"▲\";\n  color: var(--recruit);\n  font-size: 10px;\n  margin-top: 6px;\n}\n\n/* ---------- Chapters ---------- */\n.chapters {\n  padding: 120px 40px;\n  background: var(--ivory);\n}\n.chapters-inner { max-width: 1480px; margin: 0 auto; }\n.chapters-head {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 56px;\n  align-items: end;\n  margin-bottom: 56px;\n}\n\n.chapters-grid {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr;\n  gap: 32px;\n}\n\n.map-frame {\n  background: var(--ink);\n  position: relative;\n  aspect-ratio: 43.32 / 26.87;\n  overflow: hidden;\n}\n.map-frame svg { width: 100%; height: 100%; display: block; }\n\n.map-legend {\n  position: absolute;\n  bottom: 18px; left: 18px;\n  display: flex;\n  gap: 18px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ivory);\n}\n.map-legend .swatch {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n}\n.map-legend i {\n  width: 9px; height: 9px;\n  border-radius: 50%;\n  display: inline-block;\n}\n\n.map-callout {\n  position: absolute;\n  top: 18px; right: 18px;\n  background: var(--ivory);\n  color: var(--ink);\n  padding: 16px 18px;\n  max-width: 260px;\n  font-size: 13px;\n  line-height: 1.4;\n}\n.map-callout .ttl {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--recruit);\n  margin-bottom: 6px;\n}\n.map-callout .city {\n  font-family: var(--serif);\n  font-size: 26px;\n  line-height: 1;\n  margin: 0 0 10px;\n}\n\n.chapter-roster {\n  background: var(--ivory-2);\n  border: 1px solid var(--line);\n  display: flex;\n  flex-direction: column;\n}\n.chapter-roster .roster-head {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  padding: 18px 22px;\n  border-bottom: 1px solid var(--line);\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--ink-2);\n}\n.chapter-list {\n  flex: 1;\n  overflow-y: auto;\n  max-height: 520px;\n}\n.chapter-row {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  align-items: center;\n  gap: 14px;\n  padding: 14px 22px;\n  border-bottom: 1px solid var(--line);\n  cursor: pointer;\n  transition: background .15s;\n}\n.chapter-row:hover { background: var(--ivory); }\n.chapter-row.selected { background: var(--ivory); border-left: 3px solid var(--recruit); }\n.chapter-row .city {\n  font-family: var(--serif);\n  font-size: 22px;\n  line-height: 1;\n}\n.chapter-row .state {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  color: var(--ink-3);\n}\n.chapter-row .status {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  padding: 5px 9px;\n  border-radius: 999px;\n  white-space: nowrap;\n}\n.status.open    { background: var(--gold); color: var(--ink); }\n.status.active  { background: var(--rose); color: var(--ivory); }\n.status.forming { background: var(--blush); color: var(--ink); }\n.status.waitlist{ background: var(--ink); color: var(--ivory); }\n\n.found-cta {\n  padding: 22px;\n  border-top: 1px solid var(--line);\n  background: var(--ink);\n  color: var(--ivory);\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  gap: 16px;\n}\n.found-cta .label {\n  font-family: var(--serif);\n  font-size: 20px;\n  line-height: 1.15;\n}\n\n/* ---------- Membership ---------- */\n.membership {\n  padding: 120px 40px;\n  background: var(--ink);\n  color: var(--ivory);\n}\n.membership-inner { max-width: 1480px; margin: 0 auto; }\n.membership-head {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 56px;\n  align-items: end;\n  margin-bottom: 64px;\n}\n.tier-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 20px;\n}\n.tier {\n  background: rgba(245,234,219,0.04);\n  border: 1px solid rgba(245,234,219,0.18);\n  padding: 40px 36px;\n  display: flex;\n  flex-direction: column;\n  gap: 20px;\n  position: relative;\n}\n.tier.vip {\n  background: var(--ivory);\n  color: var(--ink);\n  border-color: var(--gold);\n}\n.tier .badge {\n  position: absolute;\n  top: 18px; right: 18px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  padding: 6px 10px;\n  background: var(--recruit);\n  color: var(--ivory);\n}\n.tier .label {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--gold);\n}\n.tier.vip .label { color: var(--oxblood); }\n.tier h3 {\n  font-family: var(--serif);\n  font-weight: 400;\n  font-size: 56px;\n  line-height: 1;\n  margin: 0;\n}\n.tier .price {\n  font-family: var(--serif);\n  font-size: 28px;\n  margin-top: -8px;\n}\n.tier .price small {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: rgba(245,234,219,0.6);\n  margin-left: 8px;\n}\n.tier.vip .price small { color: var(--ink-3); }\n.tier ul { list-style: none; padding: 0; margin: 8px 0 0; display: flex; flex-direction: column; gap: 10px; }\n.tier li {\n  display: grid;\n  grid-template-columns: 16px 1fr;\n  gap: 10px;\n  align-items: baseline;\n  font-size: 15px;\n  padding-bottom: 10px;\n  border-bottom: 1px dashed rgba(245,234,219,0.14);\n}\n.tier.vip li { border-bottom-color: var(--line); }\n.tier li::before { content: \"✦\"; color: var(--recruit); }\n.tier .tier-cta { margin-top: auto; padding-top: 14px; }\n\n/* ---------- Testimonials ---------- */\n.testimonials {\n  padding: 120px 40px;\n  background: var(--ivory);\n}\n.t-inner { max-width: 1480px; margin: 0 auto; }\n.t-head {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 56px;\n  margin-bottom: 56px;\n  align-items: end;\n}\n.t-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  border-top: 1px solid var(--line);\n  border-bottom: 1px solid var(--line);\n}\n.t-card {\n  padding: 40px 32px;\n  border-right: 1px solid var(--line);\n  display: flex;\n  flex-direction: column;\n  gap: 20px;\n}\n.t-card:last-child { border-right: none; }\n.t-card .stars { color: var(--recruit); letter-spacing: 2px; }\n.t-card .quote {\n  font-family: var(--serif);\n  font-size: 24px;\n  line-height: 1.25;\n  margin: 0;\n}\n.t-card .quote::before { content: \"“\"; font-size: 36px; color: var(--gold); display: block; line-height: 0.6; margin-bottom: 8px; }\n.t-card .who {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  margin-top: auto;\n}\n.t-card .ini {\n  width: 40px; height: 40px;\n  background: var(--ink);\n  color: var(--ivory);\n  display: grid; place-items: center;\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: 0.1em;\n}\n.t-card .nm { font-weight: 600; font-size: 15px; }\n.t-card .loc { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); }\n\n/* ---------- Big CTA ---------- */\n.bigcta {\n  position: relative;\n  background: var(--recruit);\n  color: var(--ivory);\n  padding: 140px 40px;\n  overflow: hidden;\n}\n.bigcta-inner { max-width: 1480px; margin: 0 auto; position: relative; z-index: 2; }\n.bigcta h2 {\n  font-family: var(--serif);\n  font-weight: 400;\n  font-size: clamp(56px, 9vw, 160px);\n  line-height: 0.88;\n  letter-spacing: -0.02em;\n  margin: 0;\n}\n.bigcta h2 em { font-style: italic; color: var(--ivory); opacity: 0.6; }\n.bigcta .sub {\n  font-size: 19px;\n  margin-top: 28px;\n  max-width: 620px;\n  opacity: 0.92;\n}\n.bigcta .cta-row {\n  display: flex; gap: 14px; margin-top: 40px;\n  flex-wrap: wrap;\n}\n.bigcta-bg {\n  position: absolute;\n  inset: 0;\n  background-image:\n    radial-gradient(circle at 20% 30%, rgba(245,234,219,0.08), transparent 50%),\n    radial-gradient(circle at 80% 70%, rgba(245,234,219,0.06), transparent 50%);\n  z-index: 1;\n}\n.bigcta::after {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background-image:\n    repeating-linear-gradient(45deg, rgba(245,234,219,0.04) 0, rgba(245,234,219,0.04) 1px, transparent 1px, transparent 20px);\n  z-index: 1;\n  pointer-events: none;\n}\n\n/* ---------- Sticky CTA bar ---------- */\n.sticky-bar {\n  position: fixed;\n  bottom: 20px;\n  left: 50%;\n  transform: translateX(-50%);\n  z-index: 60;\n  background: var(--ink);\n  color: var(--ivory);\n  display: flex;\n  align-items: center;\n  gap: 24px;\n  padding: 14px 14px 14px 24px;\n  border-radius: 999px;\n  box-shadow: 0 20px 50px -20px rgba(0,0,0,0.4);\n  transition: transform .25s, opacity .25s;\n}\n.sticky-bar.hidden { transform: translate(-50%, 200%); opacity: 0; }\n.sticky-bar .live { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }\n.sticky-bar .count {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  color: var(--gold);\n}\n.sticky-bar .btn { padding: 12px 20px; }\n\n/* ---------- Footer ---------- */\n.footer {\n  background: var(--ink);\n  color: var(--ivory);\n  padding: 100px 40px 40px;\n}\n.footer-inner { max-width: 1480px; margin: 0 auto; }\n.footer-top {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr 1fr 1fr;\n  gap: 56px;\n  padding-bottom: 56px;\n  border-bottom: 1px solid rgba(245,234,219,0.15);\n}\n.footer-brand h3 {\n  font-family: var(--serif);\n  font-size: 56px;\n  line-height: 0.9;\n  margin: 0 0 16px;\n  font-weight: 400;\n}\n.footer-brand h3 em { color: var(--recruit); font-style: italic; }\n.footer h5 {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  margin: 0 0 20px;\n  color: var(--gold);\n}\n.footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }\n.footer a { color: var(--ivory); text-decoration: none; opacity: 0.78; }\n.footer a:hover { opacity: 1; color: var(--recruit); }\n.footer-bottom {\n  display: flex;\n  justify-content: space-between;\n  padding-top: 32px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: rgba(245,234,219,0.5);\n}\n\n/* ---------- Decorative scrolling marquee ---------- */\n.marquee {\n  background: var(--gold);\n  color: var(--ink);\n  overflow: hidden;\n  padding: 22px 0;\n  border-top: 1px solid var(--gold-dk);\n  border-bottom: 1px solid var(--gold-dk);\n}\n.marquee-track {\n  display: flex;\n  gap: 48px;\n  white-space: nowrap;\n  animation: scroll 50s linear infinite;\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 32px;\n}\n.marquee-track .star { color: var(--oxblood); }\n\n/* ---------- Responsive ---------- */\n@media (max-width: 1100px) {\n  .hero-grid, .manifesto-inner, .learn-head, .chapters-head, .chapters-grid,\n  .membership-head, .t-head, .footer-top, .ask, .advocacy { grid-template-columns: 1fr; gap: 40px; }\n  .symptom-grid { grid-template-columns: repeat(2, 1fr); }\n  .pillars, .timeline, .tier-grid, .t-grid { grid-template-columns: 1fr 1fr; }\n  .nav-inner { grid-template-columns: 1fr auto; }\n  .nav-links { display: none; }\n}\n@media (max-width: 640px) {\n  .section, .learn, .chapters, .membership, .testimonials, .bigcta { padding: 60px 20px; }\n  .hero { padding: 32px 20px 0; }\n  .pillars, .timeline, .tier-grid, .t-grid, .symptom-grid { grid-template-columns: 1fr; }\n  .hero-stats { grid-template-columns: 1fr; }\n}\n<\u002Fstyle>\n\n  <script src=\"fa6d112a-4ae1-44b8-b025-2274bf69de63\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"><\u002Fscript>\n  <script src=\"9262d16b-8c57-486d-a6cf-fdc916711680\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"><\u002Fscript>\n  <script src=\"https://unpkg.com/@babel/standalone@7.29.0/babel.min.js\" integrity=\"sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y\" crossorigin=\"anonymous\"><\u002Fscript>\n\n  \n<\u002Fhead>\n<body>\n  <div id=\"root\"><\u002Fdiv>\n\n  <script type=\"text/babel\" src=\"37b48d18-9245-4e94-bf51-20a1d091736e\"><\u002Fscript>\n  <script src=\"d9cbd85d-7e04-450f-879b-7105115c05a9\"><\u002Fscript>\n  <script type=\"text/babel\" src=\"53dab007-0f94-48e8-b96d-06a28d658af1\"><\u002Fscript>\n  <script type=\"text/babel\" src=\"0e663a06-3365-40c7-a027-885e4c2acf7a\"><\u002Fscript>\n  <script type=\"text/babel\" src=\"eeedc56d-6169-45ae-ab66-6d3766214e55\"><\u002Fscript>\n  <script type=\"text/babel\" src=\"8f777840-b75c-430e-8602-5154bf2ca8fa\"><\u002Fscript>\n  <script type=\"text/babel\" src=\"d1632f65-594b-4326-af12-67e172b11390\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
